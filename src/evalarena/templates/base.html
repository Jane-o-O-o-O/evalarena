<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EvalArena{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        nav {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            border-bottom: 1px solid #2a2a4a;
        }
        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00d4ff;
        }
        nav a {
            color: #a0a0c0;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active { color: #00d4ff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; color: #fff; }
        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #2a2a4a;
        }
        .btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: #00d4ff; color: #000; }
        .btn-primary:hover { background: #00b8d4; }
        .btn-secondary { background: #2a2a4a; color: #e0e0e0; }
        .btn-secondary:hover { background: #3a3a5a; }
        .btn-a { background: #4CAF50; color: #fff; }
        .btn-a:hover { background: #45a049; }
        .btn-b { background: #2196F3; color: #fff; }
        .btn-b:hover { background: #1e88e5; }
        .btn-tie { background: #FF9800; color: #000; }
        .btn-tie:hover { background: #f57c00; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid #2a2a4a;
        }
        th { color: #a0a0c0; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { font-size: 0.95rem; }
        .rating { color: #00d4ff; font-weight: 700; font-size: 1.1rem; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-w { background: #1b5e20; color: #a5d6a7; }
        .badge-l { background: #b71c1c; color: #ef9a9a; }
        .badge-t { background: #e65100; color: #ffcc80; }
        .response-box {
            background: #0f0f1f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 1rem;
            margin: 0.5rem 0;
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }
        .vs { text-align: center; font-size: 2rem; color: #00d4ff; margin: 1rem 0; }
        .status { padding: 1rem; text-align: center; color: #a0a0c0; }
        .flash { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .flash-success { background: #1b5e20; color: #a5d6a7; }
        .flash-error { background: #b71c1c; color: #ef9a9a; }
    </style>
</head>
<body>
    <nav>
        <span class="logo">⚔️ EvalArena</span>
        <a href="/arena" class="{% block nav_arena %}{% endblock %}">Arena</a>
        <a href="/battles" class="{% block nav_battles %}{% endblock %}">Battles</a>
        <a href="/leaderboard" class="{% block nav_lb %}{% endblock %}">Leaderboard</a>
        <a href="/docs" target="_blank">API Docs</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
